<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

<title>ఉగాది శుభాకాంక్షలు</title>

<style>
body {
    margin: 0;
    font-family: 'Noto Sans Telugu', sans-serif;
    text-align: center;
    overflow-x: hidden;

    background: linear-gradient(135deg, #89c2d9, #a9def9, #cdb4db, #b5ead7);
    background-size: 300% 300%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADING */
.marquee {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.marquee span {
    font-size: 60px;
    font-weight: bold;
    color: #006400;
    text-shadow: 0 0 10px #ffffff, 0 0 20px #00ff00;
    animation: move 4s linear infinite alternate;
}

@keyframes move {
    from { transform: translateX(-20%); }
    to { transform: translateX(20%); }
}

/* TEXT BOX */
.typing-box {
    max-width: 900px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    text-align: left;
}

/* TYPING TEXT */
.typing-text {
    font-size: 28px;
    font-weight: bold;
    color: #003366;
    line-height: 1.6;
    white-space: normal;
}

/* Cursor */
.cursor {
    display: inline-block;
    width: 3px;
    background: #003366;
    margin-left: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* SIGNATURE */
.signature {
    margin: 40px auto;
    max-width: 900px;
    text-align: right;
}

.signature-box {
    position: relative;
    display: inline-block;
    padding: 25px 35px;
}

/* BORDER DRAW */
.border-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.border-svg rect {
    fill: none;
    stroke: #d63384;
    stroke-width: 3;
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
    animation: draw 4s linear infinite;
}

@keyframes draw {
    0% { stroke-dashoffset: 800; }
    100% { stroke-dashoffset: 0; }
}

/* TEXT */
.name {
    font-size: 26px;
    font-weight: bold;
    color: #002855;
}

.designation {
    font-size: 18px;
    color: #004080;
}

.sign-text {
    font-size: 20px;
    color: #003366;
}

/* FALLING */
.falling {
    position: fixed;
    top: -50px;
    font-size: 24px;
    animation: fall linear infinite;
}

@keyframes fall {
    100% {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    .marquee span { font-size: 35px; }
    .typing-text { font-size: 20px; }
}
</style>
</head>

<body>

<!-- HEADING -->
<div class="marquee">
    <span>🍃🌿 ఉగాది నూతన సంవత్సర శుభాకాంక్షలు 🌿🍃</span>
</div>

<!-- TEXT -->
<div class="typing-box">
    <span id="text" class="typing-text"></span><span class="cursor"></span>
</div>

<!-- SIGNATURE -->
<div class="signature">
    <div class="signature-box">

        <svg class="border-svg" viewBox="0 0 300 120" preserveAspectRatio="none">
            <rect x="5" y="5" width="290" height="110" rx="12"></rect>
        </svg>

        <span class="sign-text">Regards,</span><br>
        <span class="name">B. Janardhan Reddy</span><br>
        <span class="designation">GHM, ZPHS Mujahidpur</span>

    </div>
</div>

<script>
const message = `శ్రీ పరాభవ నామ సంవత్సర ఉగాది పండుగ సందర్భంగా మీకు, మీ కుటుంబ సభ్యులకు హృదయపూర్వక శుభాకాంక్షలు! ఈ కొత్త సంవత్సరం మీ జీవితంలో సుఖసంతోషాలు, ఆరోగ్యం, ఐశ్వర్యం నింపాలని, కోరిన కోర్కెలు నెరవేరాలని ఆకాంక్షిస్తూ.. ఉగాది పచ్చడిలాంటి తీపి, కారం, చేదు అనుభవాల సమాహారంతో ఈ ఏడాది మీకు ఎంతో ఫలప్రదంగా మారాలని కోరుకుంటున్నాను.`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 60); // slowed speed
    }
}
typeWriter();

/* Falling effect */
function createFalling() {
    const items = ["🌹", "🍃"];
    const el = document.createElement("div");
    el.classList.add("falling");
    el.innerHTML = items[Math.floor(Math.random() * items.length)];

    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (5 + Math.random() * 5) + "s";

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 10000);
}
setInterval(createFalling, 300);
</script>

</body>
</html>
