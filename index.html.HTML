<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

/* TOP bouncing block */
.top-box{
    position:fixed;
    top:10px;
    left:0;
    display:inline-block;
    animation: bounce 14s linear infinite alternate;
}

/* First 3 lines */
.line{
    font-family: Arial, sans-serif;
    font-weight:800;
    font-size:5vw;
    color:#ffffff;
    -webkit-text-stroke:0.7px #ffcc00;
    text-shadow:0 0 2px #ffcc00,0 0 4px #ffcc00;
    line-height:1.2;
    padding:2px 6px;
}

/* Different colour for dates line */
.date-line{
    color:#ff00ff;
    -webkit-text-stroke:0.7px #ffffff;
    text-shadow:0 0 4px #ff00ff, 0 0 8px #ff00ff;
}

/* Bottom fixed line – smaller */
.bottom-line{
    position:fixed;
    bottom:8px;
    left:0;
    width:100%;
    text-align:center;

    font-family: Arial, sans-serif;
    font-weight:700;
    font-size:3.8vw;
    color:#00ffff;
    -webkit-text-stroke:0.6px #ffffff;
    text-shadow:0 0 5px #00ffff;
}

/* bounce animation */
@keyframes bounce{
    from{ transform:translateX(0); }
    to{   transform:translateX(var(--moveX)); }
}
</style>
</head>

<body>

<div class="top-box" id="topBox">
    <div class="line">FLS MOCK TEST – 3 (ONLINE)</div>
    <div class="line">TO BE CONDUCTED</div>
    <div class="line date-line">ON 02.03.2026 AND 04.03.2026</div>
</div>

<div class="bottom-line">
    CHM ZPHS MUJAHIDPUR
</div>

<script>
function setBounceDistance(){
    const box = document.getElementById("topBox");
    const move = window.innerWidth - box.offsetWidth;
    box.style.setProperty("--moveX", (move > 0 ? move : 0) + "px");
}

window.addEventListener("load", setBounceDistance);
window.addEventListener("resize", setBounceDistance);
</script>

</body>
</html>
